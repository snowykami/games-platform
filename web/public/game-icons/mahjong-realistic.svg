      <stop offset="1" stop-color="#071916"/>
    </linearGradient>
    <radialGradient id="lamp" cx="58%" cy="24%" r="62%">
      <stop offset="0" stop-color="#ffe4a4" stop-opacity="0.42"/>
      <stop offset="0.42" stop-color="#c4853e" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tileTop" x1="0.12" y1="0.02" x2="0.86" y2="0.96">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.22" stop-color="#fffdf2"/>

    <linearGradient id="tileSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4b171"/>
      <stop offset="0.46" stop-color="#b28443"/>
      <stop offset="1" stop-color="#6f4823"/>

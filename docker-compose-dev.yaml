services:
  game-pg:
    image: postgres:16-alpine
    container_name: game-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: games_platform
      POSTGRES_USER: games_platform
      POSTGRES_PASSWORD: games_platform
    ports:
      - "5436:5432"
    volumes:
      - ./.devdata/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U games_platform -d games_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  game-redis:
    image: redis:7-alpine
    container_name: game-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6385:6379"
    volumes:
      - ./.devdata/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
